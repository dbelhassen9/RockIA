<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RockAI — Agenda</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <a href="agenda.html" class="nav-logo">Rock<span>AI</span> <div class="nav-dot"></div></a>
  <div class="nav-links">
    <a href="agenda.html" class="nav-btn active">⚡ Agenda</a>
    <a href="stats.html"  class="nav-btn">📊 Statistiques</a>
    <a href="profil.html" class="nav-btn">👤 Profil</a>
  </div>
  <div class="nav-user">
    <a href="profil.html" class="avatar" title="Profil">??</a>
    <span class="nav-user-name">—</span>
    <span class="plan-badge">—</span>
  </div>
</nav>

<div class="main-layout">
  <div class="page-content">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1>Agenda des matchs</h1>
        <p id="agenda-sub">// Chargement en cours...</p>
      </div>
      <button class="btn-outline" onclick="loadMatches()" id="refresh-btn">⟳ Actualiser</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-chip active" data-filter="all">Tous les sports</button>
      <button class="filter-chip" data-filter="Football">⚽ Football</button>
      <button class="filter-chip" data-filter="Basketball">🏀 Basketball</button>
      <button class="filter-chip" data-filter="Football Américain">🏈 NFL</button>
      <button class="filter-chip" data-filter="Hockey sur glace">🏒 Hockey</button>
      <button class="filter-chip" data-filter="Baseball">⚾ Baseball</button>
      <button class="filter-chip" data-filter="MMA / UFC">🥊 MMA</button>
      <button class="filter-chip" data-filter="Tennis">🎾 Tennis</button>
      <button class="filter-chip" data-filter="Rugby">🏉 Rugby</button>
      <div class="filter-sep"></div>
      <button class="filter-chip" data-filter="value">🔥 Value bets</button>
    </div>

    <!-- Matches container -->
    <div id="matches-container">
      <div class="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        Chargement des matchs depuis toutes les ligues...
      </div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/agenda.js"></script>
<script>
  initPage().then(() => loadMatches());
</script>
</body>
</html>
