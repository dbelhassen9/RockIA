<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RockIA{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">RockIA</a>

  <div class="nav-tabs">
    <a href="/?tab=matches" class="nav-tab {% if tab == 'matches' %}active{% endif %}">
      Matchs à venir
    </a>
    <a href="/?tab=backtest" class="nav-tab {% if tab == 'backtest' %}active{% endif %}">
      Backtest
    </a>
    <a href="/?tab=account" class="nav-tab {% if tab == 'account' %}active{% endif %}">
      Mon compte
    </a>
  </div>

  <div class="nav-right">
    {% if user %}
      <div class="nav-avatar">{{ user.username[:2].upper() }}</div>
      <span class="nav-username">{{ user.username }}</span>
      <a href="/logout" class="btn btn-sm">Déconnexion</a>
    {% else %}
      <a href="/?tab=account" class="btn btn-sm">Connexion</a>
      <a href="/?tab=account" class="btn btn-sm btn-dark">Inscription</a>
    {% endif %}
    <a href="/refresh" class="btn btn-sm" title="Actualiser les matchs">↻</a>
  </div>
</nav>

<main class="page">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
